apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${db}-pvc
  namespace: vaultrix-prod
spec:
  accessModes:
    - ReadWriteOnce
  # storageClassName: "standard" # TODO: set your StorageClass
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${db}
  namespace: vaultrix-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${db}
  template:
    metadata:
      labels:
        app: ${db}
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ${db}-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: ${db}
  namespace: vaultrix-prod
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: ${db}

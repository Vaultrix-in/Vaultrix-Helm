apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: vaultrix-dev
spec:
  parentRefs:
    - name: shared-gateway
  hostnames:
    - dev.vaultric.in
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80

{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name | default (printf "%s-grafana-route" .Release.Name) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    shared-gateway: "true"
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gateway.name }}
      namespace: {{ .Values.httpRoute.gateway.namespace }}
  hostnames:
    - {{ .Values.httpRoute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: {{ .Values.httpRoute.path.type | default "PathPrefix" }}
            value: {{ .Values.httpRoute.path.value | default "/" | quote }}
      {{- if .Values.httpRoute.urlRewrite.enabled }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .Values.httpRoute.urlRewrite.replacePrefixMatch | default "/" | quote }}
      {{- end }}
      backendRefs:
        - name: {{ .Values.httpRoute.backend.name | default (printf "%s-grafana" .Release.Name) }}
          port: {{ .Values.httpRoute.backend.port | default 80 }}
{{- end }}

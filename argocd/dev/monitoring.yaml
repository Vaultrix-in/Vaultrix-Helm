apiVersion: v1
kind: List
items:
  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: loki-dev
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      source:
        repoURL: https://github.com/Vaultrix-in/Vaultrix-Helm.git
        targetRevision: HEAD
        path: infra/dev/monitoring/loki
        helm:
          releaseName: loki
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: promtail-dev
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "6"
    spec:
      project: default
      source:
        repoURL: https://github.com/Vaultrix-in/Vaultrix-Helm.git
        targetRevision: HEAD
        path: infra/dev/monitoring/promtail
        helm:
          releaseName: promtail
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

  - apiVersion: argoproj.io/v1alpha1
    kind: Application
    metadata:
      name: prometheus-stack-dev
      namespace: argocd
      annotations:
        argocd.argoproj.io/sync-wave: "7"
    spec:
      project: default
      source:
        repoURL: https://github.com/Vaultrix-in/Vaultrix-Helm.git
        targetRevision: HEAD
        path: infra/dev/monitoring/prometheus
        helm:
          releaseName: prometheus-stack
          valueFiles:
            - values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vaultrix-prod-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Vaultrix-in/Vaultrix-Helm.git
    targetRevision: HEAD
    path: argocd/prod
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

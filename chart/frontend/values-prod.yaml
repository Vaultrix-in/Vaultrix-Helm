namespace: "vaultrix-prod"
environment: "prod"
replicaCount: 2
image:
  tag: "stable"

httpRoute:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
      sectionName: http
  hostnames:
    - vaultrix.prod.internal # TODO: set your actual prod hostname
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80

# Identity
nameOverride: ""
namespace: "vaultrix"
appName: "frontend"
component: "frontend"
partOf: "vaultrix"
environment: "dev"

replicaCount: 1

image:
  repository: "REGISTRY/vaultrix-frontend" # TODO: set your image registry
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: "frontend"
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  name: "frontend"
  type: ClusterIP
  port: 80
  targetPort: 80
  appProtocol: http

container:
  name: "frontend"
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

probes:
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

config:
  enabled: true
  mapName: "frontend"
  map:


secret:
  enabled: false
  create: false
  name: ""
  stringData: {}


httpRoute:
  enabled: true
  name: "frontend-route"
  parentRefs: []
  hostnames: []
  rules: []

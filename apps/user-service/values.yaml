replicaCount: 1

image:
  repository: ghcr.io/vaultrix-in/user-service
  pullPolicy: IfNotPresent
  tag: "bb119"

service:
  type: ClusterIP
  port: 3001

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 10m
    memory: 64Mi

env:
  PORT: "3001"
  WALLET_SERVICE_URL: "http://wallet-service:3003"


imagePullSecrets:
  - name: ghcr-login
